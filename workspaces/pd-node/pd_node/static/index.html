<!doctype html>
<html>
  <head>
    <title>Pigeon Defence</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: #25343f;
        color: #bfc9d1;
        font-family: Arial;
      }
      #pd-daemon-status-area {
        width: 90%;
        height: 50vh;
        margin-top: 10px;
      }
      #angle {
        width: 250px;
      }
    </style>
    <link rel="stylesheet" type="text/css" href="/static/index.css" />
  </head>
  <body>
    <h1>Pigeon Defence</h1>
    <main>
      <div id="live__wrapper">
        <div>
          <p>Live Feed</p>
          <button id="video-live">Play</button
          ><button id="video-live-stop">Stop</button>
        </div>

        <img id="live" />
      </div>

      <table>
        <tbody>
          <tr>
            <td>video caputre</td>
            <td><input type="checkbox" name="video" /></td>
          </tr>
          <tr>
            <td>inference</td>
            <td><input type="checkbox" name="inference" /></td>
          </tr>
          <tr>
            <td>composer</td>
            <td><input type="checkbox" name="composer" /></td>
          </tr>
          <tr>
            <td>recorder</td>
            <td>
              <button id="record-start">Start</button>
              <button id="record-stop">Stop</button>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="disk-stats">
        Video Storage:
        <span class="disk-stats__used"></span> /
        <span class="disk-stats__total"></span>
        (<span class="disk-stats__perc"></span>)
      </div>

      <div>
        <video controls id="video"></video>
      </div>

      <table id="videos">
        <tbody></tbody>
      </table>

      <div>
        <input type="range" id="angle" min="0" max="96" />
      </div>
    </main>

    <script type="text/javascript" src="/static/index.js"></script>
    <script type="text/javascript" src="/static/gamepad.js"></script>
    <script type="text/javascript" src="/static/recorder-disk.js"></script>
  </body>
</html>
